<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Counter App</title>
	<link rel="stylesheet" href="counter.css">
</head>
<body>
	<main class="counter-card">
		<h1>Counter App</h1>
		<p class="counter-label">Current Count</p>
		<div id="count" class="counter-value">0</div>
		<div class="button-row">
			<button id="downBtn" type="button">Down</button>
			<button id="upBtn" type="button">Up</button>
		</div>
	</main>

	<script src="counter.js"></script>
</body>
</html>
